<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- 太极图 - 代表运动养生 -->
  <!-- 外圆 -->
  <circle cx="32" cy="32" r="24" stroke="#4A7C59" stroke-width="2.5" fill="none"/>
  <!-- S曲线 -->
  <path d="M32 8c-8 0-14 6-14 14s6 10 14 10 14 6 14 14" stroke="#4A7C59" stroke-width="2.5" fill="none"/>
  <!-- 阴阳鱼分隔线 -->
  <path d="M32 8c8 0 14 6 14 14s-6 10-14 10" stroke="#4A7C59" stroke-width="2.5" fill="none"/>
  <!-- 阳鱼眼 -->
  <circle cx="32" cy="18" r="4" fill="#4A7C59"/>
  <!-- 阴鱼眼 -->
  <circle cx="32" cy="46" r="4" fill="white" stroke="#4A7C59" stroke-width="2"/>
  <!-- 太极周围的小圆点 - 象征气血运行 -->
  <circle cx="32" cy="4" r="2" fill="#4A7C59"/>
  <circle cx="32" cy="60" r="2" fill="#4A7C59"/>
  <circle cx="4" cy="32" r="2" fill="#4A7C59"/>
  <circle cx="60" cy="32" r="2" fill="#4A7C59"/>
</svg>
